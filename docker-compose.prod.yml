services:
  client:
    build: 
      context: ./client
      args:
        NEXT_PUBLIC_API_URL: http://103.101.163.17:8000/api/v1
    container_name: blog_client
    ports:
      - "3000:3000"
    depends_on:
      - server
    restart: always

  server:
    build: ./server
    container_name: blog_server
    ports:
      - "8000:8000"
    env_file:
      - ./server/.env.production
    depends_on:
      - postgres
    restart: always

  postgres:
    image: postgres:16
    container_name: blog_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: blog_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

volumes:
  postgres_data:
